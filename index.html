<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Checklist Manual</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 p-6">
  <div class="max-w-3xl mx-auto bg-white rounded-xl shadow p-6 space-y-6">

    <h1 class="text-xl font-bold uppercase tracking-wider">
      Checklist de Entrega (Manual)
    </h1>

    <!-- Dados principais -->
    <div class="grid grid-cols-2 gap-4">
      <input id="brand" placeholder="Marca" class="input" />
      <input id="model" placeholder="Modelo" class="input" />
      <input id="plate" placeholder="Placa" class="input uppercase" />
      <input id="year" placeholder="Ano" class="input" />
      <input id="customer" placeholder="Cliente" class="input col-span-2" />
      <input id="odometer" placeholder="KM Atual" class="input col-span-2" />
    </div>

    <!-- Checklist -->
    <div>
      <h2 class="font-bold uppercase text-sm mb-2">Checklist</h2>
      <div id="checklist" class="space-y-2"></div>
    </div>

    <!-- Termos -->
    <div>
      <h2 class="font-bold uppercase text-sm mb-2">Termos</h2>
      <div id="terms" class="space-y-2 text-xs"></div>
    </div>

    <!-- Service Center -->
    <div class="flex gap-6 text-sm">
      <label class="flex gap-2">
        <input type="radio" name="serviceCenter" value="autoparvi" checked>
        Autoparvi Center
      </label>
      <label class="flex gap-2">
        <input type="radio" name="serviceCenter" value="dealer">
        Concessionária
      </label>
    </div>

    <!-- Datas -->
    <div class="grid grid-cols-2 gap-4">
      <input id="deliveryDate" type="date" class="input" />
      <input id="nextRevisionDate" type="date" class="input" />
      <input id="nextRevisionKm" placeholder="KM Próxima Revisão" class="input col-span-2" />
    </div>

    <button
      onclick="generatePrint()"
      class="w-full bg-emerald-600 text-white font-bold py-3 rounded-lg"
    >
      Gerar & Imprimir
    </button>

  </div>

<script src="script.js"></script>

<style>
  .input {
    @apply border rounded px-3 py-2 text-sm w-full;
  }
</style>
</body>
</html>
