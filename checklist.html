<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Checklist de Entrega</title>

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    @media print {
      @page {
        size: A4;
        margin: 10mm 12mm;
      }
      body {
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }
      .no-print {
        display: none;
      }
    }
  </style>
</head>

<body class="bg-slate-100 p-4">

<!-- =========================
     FORMULÁRIO (MANUAL)
========================= -->
<div class="max-w-4xl mx-auto bg-white rounded-lg shadow p-6 no-print">

  <h1 class="text-center font-bold tracking-widest text-xl mb-6">
    CHECKLIST DE ENTREGA
  </h1>

  <!-- Veículo -->
  <div class="grid grid-cols-2 md:grid-cols-5 gap-3 mb-6 text-xs">
    <input id="brand" placeholder="Marca" class="border p-2">
    <input id="model" placeholder="Modelo" class="border p-2">
    <input id="plate" placeholder="Placa" class="border p-2 font-mono">
    <input id="year" placeholder="Ano" class="border p-2">
    <input id="customer" placeholder="Cliente" class="border p-2 col-span-2 md:col-span-1">
  </div>

  <!-- Checklist -->
  <h3 class="font-bold uppercase text-sm mb-3">Checklist</h3>
  <div id="checklist-form" class="space-y-2 text-xs"></div>

  <!-- Termos -->
  <h3 class="font-bold uppercase text-sm mt-6 mb-3">Termos</h3>
  <div class="space-y-2 text-xs">
    <label class="flex gap-2"><input type="checkbox" id="term_0"> Revisões periódicas</label>
    <label class="flex gap-2"><input type="checkbox" id="term_1"> Garantia explicada</label>
    <label class="flex gap-2"><input type="checkbox" id="term_2"> Veículo em perfeitas condições</label>
    <label class="flex gap-2"><input type="checkbox" id="term_3"> Garantia Auto Parvi</label>
    <label class="flex gap-2"><input type="checkbox" id="term_4"> Garantia Legal 90 dias</label>
  </div>

  <!-- Datas -->
  <div class="grid grid-cols-3 gap-3 mt-6 text-xs">
    <input type="date" id="deliveryDate" class="border p-2">
    <input type="date" id="nextRevisionDate" class="border p-2">
    <input placeholder="KM Próxima Revisão" id="nextRevisionKm" class="border p-2 font-mono">
  </div>

  <button onclick="generatePrint()" class="mt-6 w-full bg-black text-white font-bold py-3 rounded">
    GERAR E IMPRIMIR
  </button>
</div>

<!-- =========================
     ÁREA DE IMPRESSÃO
========================= -->
<div id="print-area" class="hidden"></div>

<script>
const checklistItems = [
  'Chave Reserva',
  'Manual',
  'Ar-condicionado',
  'Itens Elétricos',
  'CRLV',
  'Manual de Garantia',
  'Itens Obrigatórios',
  'Tapetes',
  'Parafuso de Rodas',
  'Cartão de Memória',
  'Cartão GPS',
  'Carregador Portátil',
  'Wall Box'
];

// Render checklist inputs
const checklistForm = document.getElementById('checklist-form');
checklistItems.forEach((item, i) => {
  checklistForm.innerHTML += `
    <div class="flex justify-between items-center border p-2 rounded bg-slate-50">
      <span>${item}</span>
      <div class="flex gap-3">
        <label class="flex gap-1 items-center">
          <input type="radio" name="item_${i}" value="ok"> OK
        </label>
        <label class="flex gap-1 items-center">
          <input type="radio" name="item_${i}" value="faltando"> Faltando
        </label>
      </div>
    </div>
  `;
});

function generatePrint() {
  const half = Math.ceil(checklistItems.length / 2);
  let left = '', right = '';

  checklistItems.forEach((item, i) => {
    const v = document.querySelector(`input[name="item_${i}"]:checked`);
    const checked = v?.value === 'ok';
    const missing = v?.value === 'faltando';

    const row = `
      <div class="flex justify-between items-center text-[8.5px] py-1">
        <span>${item}</span>
        <div class="flex gap-3">
          <div class="flex gap-1 items-center">
            <div class="w-3 h-3 border ${checked ? 'bg-black' : ''}"></div> OK
          </div>
          <div class="flex gap-1 items-center">
            <div class="w-3 h-3 border ${missing ? 'bg-black' : ''}"></div> FALTANDO
          </div>
        </div>
      </div>
    `;
    i < half ? left += row : right += row;
  });

  document.getElementById('print-area').innerHTML = `
    <div class="p-6 text-[9px] font-sans">

      <h2 class="text-center font-bold tracking-widest text-sm mb-4">
        TERMO DE ENTREGA
      </h2>

      <div class="grid grid-cols-5 gap-3 mb-4">
        <div><strong>Marca:</strong> ${brand.value}</div>
        <div><strong>Modelo:</strong> ${model.value}</div>
        <div><strong>Placa:</strong> ${plate.value}</div>
        <div><strong>Ano:</strong> ${year.value}</div>
        <div><strong>Cliente:</strong> ${customer.value}</div>
      </div>

      <h3 class="font-bold uppercase text-xs mb-2">Checklist</h3>
      <div class="grid grid-cols-[1fr_1px_1fr] gap-4">
        <div>${left}</div>
        <div class="bg-gray-300"></div>
        <div>${right}</div>
      </div>

      <h3 class="font-bold uppercase text-xs mt-4">Termos</h3>
      <div class="space-y-1">
        ${[0,1,2,3,4].map(i =>
          document.getElementById(`term_${i}`).checked
            ? `<p>${i + 14}. Termo aceito</p>`
            : ''
        ).join('')}
      </div>

      <div class="text-center mt-6">
        ${deliveryDate.value}
      </div>

      <div class="grid grid-cols-2 gap-10 mt-10">
        <div class="text-center border-t pt-2">Cliente</div>
        <div class="text-center border-t pt-2">Representante</div>
      </div>
    </div>
  `;

  document.getElementById('print-area').classList.remove('hidden');
  window.print();
}
</script>

</body>
</html>
